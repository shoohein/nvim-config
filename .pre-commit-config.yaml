repos:
  - repo: local
    hooks:
      - id: stylua
        name: stylua
        entry: /home/agent/.local/bin/stylua
        args: [--config-path, .stylua.toml]
        language: system
        types: [lua]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
