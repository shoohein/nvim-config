repos:
  - repo: https://github.com/JohnnyMorganz/stylua
    rev: v2.0.2
    hooks:
      - id: stylua
        args: [--config-path, .stylua.toml]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
